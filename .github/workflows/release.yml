name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.wasm && '(Webassembly)' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wasm: false
            platform: linux
            arch: amd64
          - os: ubuntu-latest
            wasm: true
            platform: web
            arch: universal
          - os: macOS-latest
            platform: macos
            arch: aarch64
          - os: windows-latest
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Extract version from tag (e.g., v0.1.0 -> 0.1.0, v0.1.0-alpha -> 0.1.0-alpha)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            
            # Validate version contains only safe characters (letters, numbers, -, ., +, _)
            if [[ ! "$VERSION" =~ ^[a-zA-Z0-9._+-]+$ ]]; then
              echo "Error: Invalid version format '$VERSION'. Only letters, numbers, and -.+_ are allowed."
              exit 1
            fi
            
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.wasm == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libudev-dev

      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest' && matrix.wasm == true
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --version 0.13.1

      - name: Build Binary
        run: cargo build --verbose --release
        if: matrix.wasm == false

      - name: Build Web
        run: |
          wasm-pack build --target web --out-dir ../../dist --out-name moyu -s momoyu-ink crates/moyu
        if: matrix.wasm == true

      - name: Collect and package artifacts (Native)
        if: matrix.wasm == false
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/moyu.exe artifacts/
          else
            cp target/release/moyu artifacts/
          fi
          # Create zst archive
          ARCHIVE_NAME="${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.tar.zst"
          tar -C artifacts -cf - . | zstd -o "$ARCHIVE_NAME"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Collect and package artifacts (Web)
        if: matrix.wasm == true
        shell: bash
        run: |
          # Create zst archive for web build
          ARCHIVE_NAME="${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.tar.zst"
          tar -C dist -cf - . | zstd -o "$ARCHIVE_NAME"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.version.outputs.version }}
          path: "*.tar.zst"
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Extract version from tag (e.g., v0.1.0 -> 0.1.0, v0.1.0-alpha -> 0.1.0-alpha)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            
            # Validate version contains only safe characters (letters, numbers, -, ., +, _)
            if [[ ! "$VERSION" =~ ^[a-zA-Z0-9._+-]+$ ]]; then
              echo "Error: Invalid version format '$VERSION'. Only letters, numbers, and -.+_ are allowed."
              exit 1
            fi
            
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing dev release
        if: steps.version.outputs.is_tag == 'false'
        continue-on-error: true
        run: |
          gh release delete dev --yes --cleanup-tag --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ steps.version.outputs.is_tag }}" == "true" ]]; then
            # For tagged releases - check if release exists and edit it
            RELEASE_NAME="Release $VERSION"
            TAG_NAME="v$VERSION"
            PRERELEASE=""
            if [[ "$VERSION" == *"-"* ]]; then
              PRERELEASE="--prerelease"
            fi
            
            # Check if release exists
            if gh release view "$TAG_NAME" --repo ${{ github.repository }} >/dev/null 2>&1; then
              echo "Release $TAG_NAME already exists, editing it"
              gh release edit "$TAG_NAME" --title "$RELEASE_NAME" $PRERELEASE --repo ${{ github.repository }}
            else
              echo "Creating new release $TAG_NAME"
              gh release create "$TAG_NAME" --title "$RELEASE_NAME" $PRERELEASE --repo ${{ github.repository }}
            fi
          else
            # For dev releases
            RELEASE_NAME="Development Build"
            TAG_NAME="dev"
            gh release create "$TAG_NAME" --title "$RELEASE_NAME" --prerelease --draft=false --notes "Latest development build from main branch" --repo ${{ github.repository }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.version.outputs.is_tag == 'true' && format('v{0}', steps.version.outputs.version) || 'dev' }}"
          
          # Upload all artifacts
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              for file in "$dir"*.tar.zst; do
                if [ -f "$file" ]; then
                  gh release upload "$TAG_NAME" "$file" --clobber --repo ${{ github.repository }}
                fi
              done
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
