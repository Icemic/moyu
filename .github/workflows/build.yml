name: Build & Test

on:
  push:
    branches:
      - feat/*
      - fix/*
      - refactor/*
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_NDK_PLATFORM: 26
  ANDROID_NDK_VERSION: 30.0.14904198

jobs:
  build:
    name: Build on ${{ matrix.os }}${{ matrix.target && format(' ({0})', matrix.target) || '' }}${{ matrix.wasm && ' (Webassembly)' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wasm: false
          - os: ubuntu-24.04-arm
            wasm: false
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            wasm: true
          - os: ubuntu-latest
            wasm: false
            android: true
            target: aarch64-linux-android
          - os: macos-15
            wasm: false
            target: aarch64-apple-darwin
          - os: macos-15
            wasm: false
            target: x86_64-apple-darwin
          - os: windows-latest
            wasm: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Linux Dependencies
        if: runner.os == 'Linux' && matrix.wasm == false && matrix.android != true
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libudev-dev

      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest' && matrix.wasm == true
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack

      - name: Install Android Dependencies
        if: matrix.android == true
        shell: bash
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version 4.1.2 --locked
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          set +o pipefail
          yes | "$SDKMANAGER" --install "ndk;$ANDROID_NDK_VERSION"
          set -o pipefail
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Install Rust target
        if: matrix.target && matrix.android != true
        run: rustup target add ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --verbose --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        if: matrix.wasm == false && matrix.android != true

      - name: Build Android
        shell: bash
        run: |
          cargo ndk -t arm64-v8a build --release
          mkdir -p artifacts/android-aarch64
          cp target/aarch64-linux-android/release/liblibmoyu.so artifacts/android-aarch64/libmoyu.so
        if: matrix.android == true

      - name: Upload Android artifact
        if: matrix.android == true
        uses: actions/upload-artifact@v7
        with:
          name: android-aarch64
          path: artifacts/android-aarch64/libmoyu.so
          if-no-files-found: error
          retention-days: 7

      - name: Build Web
        run: |
          wasm-pack build --target web --out-dir ../../dist --out-name moyu -s momoyu-ink crates/moyu
        if: matrix.wasm == true
