name: Build & Test

on:
  push:
    branches:
      - feat/*
      - fix/*
      - refactor/*
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}${{ matrix.target && format(' ({0})', matrix.target) || '' }}${{ matrix.wasm && ' (Webassembly)' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wasm: false
          - os: ubuntu-latest
            wasm: true
          - os: macos-15
            wasm: false
            target: aarch64-apple-darwin
          - os: macos-15
            wasm: false
            target: x86_64-apple-darwin
          - os: windows-latest
            wasm: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.wasm == false
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libudev-dev

      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest' && matrix.wasm == true
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack

      - name: Install Rust target
        if: matrix.target
        run: rustup target add ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --verbose --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        if: matrix.wasm == false

      - name: Build Web
        run: |
          wasm-pack build --target web --out-dir ../../dist --out-name moyu -s momoyu-ink crates/moyu
        if: matrix.wasm == true
