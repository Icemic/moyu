name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Windows
      run: cargo build --verbose
    - name: Build Web
      run: cargo build -p hai --lib --target wasm32-unknown-unknown --no-default-features --features web,text
