[workspace]
default-members = ["crates/hai"]
members = [
  "crates/hai",
  "crates/core",
  "crates/runtime",
  "crates/platform",
  "crates/macros",
  "crates/run_wasm",
  "crates/nodes",
  "crates/ops",
  "crates/audio",
  "crates/scenario",
]
resolver = "2"

[workspace.dependencies]
cfg_aliases = "0.2.1"

hai_audio = {path = "crates/audio"}
hai_core = {path = "crates/core"}
hai_macros = {path = "crates/macros"}
hai_nodes = {path = "crates/nodes"}
hai_ops = {path = "crates/ops"}
hai_pal = {path = "crates/platform"}
hai_runtime = {path = "crates/runtime"}
hai_scenario = {path = "crates/scenario"}

[patch.crates-io]
# huozi = {path = "../huozi-rs"}
# quickjs-rusty = {path = "../quickjs-rusty"}
# wasm-bindgen = {path = "../wasm-bindgen"}
# wasm-bindgen-shared = {path = "../wasm-bindgen/crates/shared"}
# wasm-bindgen-cli-support = {path = "../wasm-bindgen/crates/cli-support"}
# wasm-bindgen-macro = {path = "../wasm-bindgen/crates/macro"}
# wasm-bindgen-backend = {path = "../wasm-bindgen/crates/backend"}

wasm-bindgen = {git = "https://github.com/Icemic/wasm-bindgen", branch = "option_jsvalue"}
wasm-bindgen-cli-support = {git = "https://github.com/Icemic/wasm-bindgen", branch = "option_jsvalue"}
