[workspace]
default-members = ["crates/doufu"]
members = [
  "crates/doufu",
  "crates/core",
  "crates/runtime",
  "crates/platform",
  "crates/macros",
  "crates/run_wasm",
  "crates/nodes",
  "crates/ops",
  "crates/audio",
  "crates/scenario",
  "crates/gamepad",
]
resolver = "2"

[workspace.dependencies]
cfg_aliases = "0.2.1"

doufu_audio = {path = "crates/audio"}
doufu_core = {path = "crates/core"}
doufu_gamepad = {path = "crates/gamepad"}
doufu_macros = {path = "crates/macros"}
doufu_nodes = {path = "crates/nodes"}
doufu_ops = {path = "crates/ops"}
doufu_pal = {path = "crates/platform"}
doufu_runtime = {path = "crates/runtime"}
doufu_scenario = {path = "crates/scenario"}

[patch.crates-io]
