[workspace]
default-members = ["crates/moyu"]
members = [
  "crates/moyu",
  "crates/core",
  "crates/runtime",
  "crates/platform",
  "crates/macros",
  "crates/run_wasm",
  "crates/nodes",
  "crates/ops",
  "crates/audio",
  "crates/scenario",
  "crates/gamepad",
]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0"
arc-swap = "1.6"
bytemuck = {version = "1.13", features = ["derive"]}
cfg_aliases = "0.2.1"
csscolorparser = {version = "0.7", features = ["serde"]}
glam = {version = "0.30", features = ["bytemuck"]}
log = "0.4"
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
tokio = {version = "1"}
wasm-bindgen = {version = "0.2.83", default-features = false}
wasm-bindgen-futures = "0.4"
web-sys = {version = "0.3.56"}
wgpu = {version = "22.0", features = ["fragile-send-sync-non-atomic-wasm", "webgl"]}
winit = {version = "0.29"}

moyu_audio = {path = "crates/audio"}
moyu_core = {path = "crates/core"}
moyu_gamepad = {path = "crates/gamepad"}
moyu_macros = {path = "crates/macros"}
moyu_nodes = {path = "crates/nodes"}
moyu_ops = {path = "crates/ops"}
moyu_pal = {path = "crates/platform"}
moyu_runtime = {path = "crates/runtime"}
moyu_scenario = {path = "crates/scenario"}

[patch.crates-io]
# huozi = {path = "../huozi-rs"}
# quickjs-rusty = {path = "../quickjs-rusty"}
# sixu = {path = "../sixu/sixu"}

sixu = {git = "https://github.com/Icemic/sixu", branch = "master"}
