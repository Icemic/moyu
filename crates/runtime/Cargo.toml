[package]
description = "Javascript runtime for Moyu based on QuickJS."
edition = "2021"
license = "MPL-2.0"
name = "moyu_runtime"
repository = "https://github.com/DeepSpaceMill/moyu"
version = "0.7.0"

[dependencies]
anyhow = "1"
log = "0.4"
quickjs-rusty = "0.9.1"
serde = "1"
spin_sleep = "1.1"
tokio = {version = "1", features = ["time", "sync"]}

moyu_pal = {version = "0.7", path = "../platform"}

[dev-dependencies]
env_logger = {version = "0.11"}
tokio = {version = "1", features = ["full"]}
