[package]
description = "Javascript runtime for Hai based on QuickJS."
edition = "2021"
license = "MPL-2.0"
name = "doufu_runtime"
repository = "https://github.com/DeepSpaceMill/doufu"
version = "0.7.0"

[dependencies]
anyhow = "1"
log = "0.4"
quickjs-rusty = "0.8.0"
spin_sleep = "1.1"
tokio = {version = "1", features = ["time", "sync"]}

doufu_pal = {version = "0.7", path = "../platform"}

[dev-dependencies]
env_logger = {version = "0.11"}
tokio = {version = "1", features = ["full"]}
