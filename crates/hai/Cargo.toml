[package]
edition = "2021"
name = "hai"
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["desktop"]
desktop = ["hai_core/desktop"]
video = ["hai_core/video"]
web = [
  "hai_core/web",
]

[dependencies]
log = "0.4"
winit = "0.28"

[dependencies.hai_core]
path = "../core"
version = "0.1"

[dependencies.hai_js_runtime]
optional = true
path = "../js_runtime"
version = "0.1"

[dependencies.hai_pal]
path = "../platform"
version = "0.1"
