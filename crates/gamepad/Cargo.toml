[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
description = "Gamepad plugin for Hai."
edition = "2021"
license = "MPL-2.0"
name = "doufu_gamepad"
repository = "https://github.com/DeepSpaceMill/doufu"
version = "0.7.0"

[dependencies]
anyhow = "1.0"
log = "0.4"
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"

[target.'cfg(any(windows, target_os = "linux", target_os = "macos", target_arch = "wasm32"))'.dependencies]
gilrs = "0.11"

[dependencies.doufu_pal]
path = "../platform"
version = "0.7"

[dependencies.doufu_core]
default-features = false
features = ["js_runtime"]
path = "../core"
version = "0.7"

[build-dependencies]
cfg_aliases = {workspace = true}
