[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
description = "Platform abstraction layer for Hai."
edition = "2021"
license = "Apache-2.0"
name = "hai_pal"
repository = "https://github.com/Icemic/hai"
version = "0.7.0"

[features]
default = []
desktop = [
  "dotenv",
  "env_logger",
  "node-resolve",
  "parking_lot",
  "tokio",
  "parking_lot/hardware-lock-elision",
]
web = [
  "console_error_panic_hook",
  "console_log",
  "parking_lot",
  "wasm-bindgen-futures",
  "web-time",
]

[dependencies]
anyhow = "1.0"
log = "0.4"
once_cell = "1.16"
parking_lot = {version = "0.12", optional = true}
reqwest = {version = "0.12", default-features = false, features = ["rustls-tls", "gzip", "deflate", "brotli"]}
serde = {version = "1.0", features = ["derive"]}
url = "2.2"
# deps for desktop platforms
dotenv = {version = "0.15.0", optional = true}
env_logger = {version = "0.11", optional = true}
envy = "0.4"
node-resolve = {version = "2.2", optional = true}
tokio = {version = "1", features = ["full"], optional = true}
# deps for web
console_error_panic_hook = {version = "0.1", optional = true}
console_log = {version = "0.2.0", features = ["color"], optional = true}
wasm-bindgen-futures = {version = "0.4", optional = true}
web-time = {version = "1.1", optional = true}
