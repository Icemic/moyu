[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
description = "Platform abstraction layer for Hai."
edition = "2021"
license = "MPL-2.0"
name = "hai_pal"
repository = "https://github.com/Icemic/hai"
version = "0.7.0"

[features]
default = []
desktop = []
web = []

[dependencies]
anyhow = "1.0"
csscolorparser = {version = "0.6", features = ["serde"]}
log = "0.4"
once_cell = "1.16"
pollster = "0.4.0"
reqwest = {version = "0.12", default-features = false, features = ["rustls-tls", "gzip", "deflate", "brotli"]}
serde = {version = "1.0", features = ["derive"]}
url = "2.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
env_logger = "0.11"
node-resolve = "2.2"
parking_lot = {version = "0.12", features = ["hardware-lock-elision"]}
serde_json = "1.0"
tokio = {version = "1", features = ["full"]}

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1"
console_log = {version = "1.0", features = ["color"]}
parking_lot = "0.12"
wasm-bindgen-futures = "0.4"
web-sys = {version = "0.3.56", features = ["Window", "Location"]}
web-time = "1.1"

[target.'cfg(target_os = "android")'.dependencies]
android-activity = "0.5.2"
android_logger = "0.14.1"

[build-dependencies]
cfg_aliases = {workspace = true}
