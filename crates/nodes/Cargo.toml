[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
description = "Extra nodes and renderers for Hai."
edition = "2021"
license = "Apache-2.0"
name = "hai_nodes"
repository = "https://github.com/Icemic/hai"
version = "0.7.0"

[features]
default = []
desktop = ["hai_core/quickjs", "hai_pal/desktop"]
js_runtime = ["hai_core/js_runtime"]
quickjs = ["hai_core/quickjs"]
web = ["hai_core/web", "hai_pal/web"]

text = ["dep:huozi", "dep:glam"]
video = ["dep:ffmpeg-rs"]
yuv_sprite = []

[dependencies]
anyhow = "1.0"
arc-swap = "1.6"
bytemuck = {version = "1.13", features = ["derive"]}
log = "0.4"
serde = {version = "1.0", features = ["derive"]}
wgpu = "0.20"

# optional for features
ffmpeg-rs = {version = "5.2.1", optional = true}
glam = {version = "0.28", features = ["bytemuck"], optional = true}
huozi = {version = "0.6", optional = true}

[dependencies.hai_macros]
default-features = false
path = "../macros"
version = "0.7"

[dependencies.hai_pal]
path = "../platform"
version = "0.7"

[dependencies.hai_core]
default-features = false
path = "../core"
version = "0.7"
