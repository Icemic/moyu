[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
edition = "2021"
license = "Apache-2.0"
name = "hai_nodes"
repository = "https://github.com/Icemic/hai"
version = "0.5.0"

[features]
default = ["js_runtime", "text"]
js_runtime = []
text = ["dep:huozi", "dep:glam"]
video = ["dep:ffmpeg-rs"]

[dependencies]
anyhow = "1.0"
arc-swap = "1.6"
bytemuck = {version = "1.13", features = ["derive"]}
log = "0.4"
serde = {version = "1.0", features = ["derive"]}
wgpu = "0.19.1"

# optional for features
ffmpeg-rs = {version = "5.2.1", optional = true}
glam = {version = "0.25", features = ["bytemuck"], optional = true}
huozi = {version = "0.5", optional = true}

[dependencies.hai_macros]
default-features = false
path = "../macros"
version = "0.4"

[dependencies.hai_pal]
path = "../platform"
version = "0.5"

[dependencies.hai_core]
default-features = false
path = "../core"
version = "0.5"
