[package]
authors = ["Icemic <bingfeng.web@gmail.com>"]
description = "Operations inside Javascript runtime for Hai."
edition = "2021"
license = "MPL-2.0"
name = "hai_ops"
repository = "https://github.com/Icemic/hai"
version = "0.7.0"

[features]
default = []
desktop = [
  "hai_core/desktop",
  "hai_pal/desktop",
  "hai_nodes/desktop",
  "hai_macros/quickjs",
  "hai_core/quickjs",
]
js_runtime = ["hai_core/js_runtime"]
quickjs = ["hai_runtime", "hai_macros/quickjs", "hai_core/quickjs"]
web = [
  "hai_core/web",
  "wasm-bindgen",
  "wasm-bindgen-futures",
  "web-sys",
]

text = []
video = []

[dependencies]
anyhow = "1.0"
log = "0.4"

# optional dependencies
wasm-bindgen = {version = "0.2.83", default-features = false, optional = true}
wasm-bindgen-futures = {version = "0.4.33", optional = true}
web-sys = {version = "0.3.56", features = ["Window", "Element", "Document", "HtmlElement", "HtmlCanvasElement"], optional = true}

[dependencies.hai_macros]
default-features = false
path = "../macros"
version = "0.7"

[dependencies.hai_pal]
path = "../platform"
version = "0.7"

[dependencies.hai_core]
default-features = false
features = ["js_runtime"]
path = "../core"
version = "0.7"

[dependencies.hai_runtime]
optional = true
path = "../runtime"
version = "0.7"

[dependencies.hai_nodes]
path = "../nodes"
version = "0.7"
