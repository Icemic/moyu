<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{name}}</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module">
      const urlParams = new URLSearchParams(window.location.search);
      window.__moyu_entry = urlParams.get('entry');

      import * as moyu from './libmoyu.js';
      window.addEventListener('load', async () => {
        await moyu.default();
        window.moyu = {
          pushCommand(name, args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return moyu[name](...args);
          },
          executeNodeCommand(...args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return moyu.execute_node_command(...args);
          },
          executePluginCommand(...args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return moyu.execute_plugin_command(...args);
          },
        };

        window.moyu_start = () => {
          moyu.moyu_init('root');
        };
      });
    </script>
    <button onclick="window.moyu_start()">Start</button>
  </body>
</html>
