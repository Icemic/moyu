<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{name}}</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module">
      const urlParams = new URLSearchParams(window.location.search);
      window.__hai_entry = urlParams.get('entry');

      import * as hai from './hai_lib.js';
      window.addEventListener('load', async () => {
        await hai.default();
        window.hai = {
          pushCommand(name, args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return hai[name](...args);
          },
          executeNodeCommand(...args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return hai.execute_node_command(...args);
          },
          executePluginCommand(...args) {
            // eslint-disable-next-line @typescript-eslint/no-unsafe-argument
            return hai.execute_plugin_command(...args);
          },
        };

        window.hai_start = () => {
          hai.doufu_init('root');
        };
      });
    </script>
    <button onclick="window.hai_start()">Start</button>
  </body>
</html>
